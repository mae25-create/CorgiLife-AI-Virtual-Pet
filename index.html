
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CorgiLife: AI Virtual Pet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #fdf6e3;
    }
    .pb-safe {
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }
    .font-brand {
      font-family: 'Fredoka One', cursive;
    }
    /* Simple wiggle animation for hovering on interactive elements */
    .wiggle:hover {
      animation: wiggle 0.5s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    /* Squeak jump animation */
    .animate-squeak {
      animation: squeak 0.3s ease-in-out 3;
    }
    @keyframes squeak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1) translateY(-20px); }
    }
    /* Scrollbar hide for chat */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
